      <h2><a href="/case-studies">Case Studies</a></h2>
      <p>Detailed performance marketing projects and results</p>
      <h3>Packt — Scaling Paid GTM for Events</h3>
      <p><strong>Problem Statement:</strong> A complete go-to-market strategy for a paid, 2-hour hands-on workshop targeting engineers. The campaign successfully acquired 150+ paid attendees at a $23 blended CAC while maintaining 93% net-new acquisition.</p>
      <p><strong>Actions Taken:</strong></p>
      <ul>
        <li>Implemented a phased Meta Ads strategy: Learning (6 ad sets), Scale (top performers), and Retargeting</li>
        <li>Established Tier 1 (Rev-share) and Tier 2 (Flat-fee) creator partnerships with 5K+ audiences</li>
        <li>Executed community seeding via newsletter sponsorships and placements in GitHub, Reddit, and Discord</li>
      </ul>
      <h3>Jones Road Beauty — 30-Day CRO Strategy</h3>
      <p><strong>Problem Statement:</strong> The brand was leaking revenue across product pages, shade selection, checkout, and post-purchase flows with no internal analytics access at the start.</p>
      <p><strong>Actions Taken:</strong></p>
      <ul>
        <li>Mapped the full funnel from PDP to post-purchase using outside-in UX and competitive research</li>
        <li>Built hypothesis-driven test clusters for clarity, shade anxiety, first-time buyers, and checkout confidence</li>
        <li>Sequenced tests to prioritize conversion rate before AOV or urgency</li>
        <li>Defined guardrails and decision rules to prevent noisy or conflicting experiments</li>
      </ul>
      <h3>Audio Platform — Scaling User Acquisition</h3>
      <p><strong>Problem Statement:</strong> This 90-day growth initiative focused on scaling user acquisition for a leading audio entertainment platform while improving cost efficiency in a highly competitive market.</p>
      <p><strong>Actions Taken:</strong></p>
      <ul>
        <li>Transitioned to 15-second mobile-first vertical video creatives tailored for sound-on engagement</li>
        <li>Deployed regional language variations and Free messaging hooks to unlock new audience pools</li>
        <li>Targeted high-LTV Commuter demographics through granular audience segmentation</li>
        <li>Leveraged CBO and Cost Caps to maintain efficiency during the accelerated scaling phase</li>
      </ul>
      <h3>Internal Tooling — Production Hardened AI Lead Engine</h3>
      <p><strong>Problem Statement:</strong> Cold outreach requires significant manual research and qualification. This 26-node n8n workflow completely automates Google Maps scraping, ScrapingBee site crawling, AI-driven data cleansing, and CRM deduplication.</p>
      <p><strong>Actions Taken:</strong></p>
      <ul>
        <li>Replaced brittle basic HTTP triggers with Webhooks returning immediate 202 Accepted status</li>
        <li>Integrated ScrapingBee to bypass Cloudflare and scrape React/JS-rendered sites via proxies</li>
        <li>Prompt engineered GPT-4o-mini to sniff out deeply obfuscated emails</li>
        <li>Added zero-record deduplication gating before committing data to Airtable/Sheets</li>
      </ul>
